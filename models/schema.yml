version: 2

models:
  - name: stg_customers
    description: Cleaned customer data from the seed file.
    columns:
      - name: customer_id
        description: Unique identifier for each customer.
        tests:
          - not_null
          - unique

      - name: email
        description: Customer email address.
        tests:
          - not_null

  - name: stg_products
    description: Cleaned product data from the seed file.
    columns:
      - name: product_id
        description: Unique identifier for each product.
        tests:
          - not_null
          - unique

  - name: stg_orders
    description: Cleaned order data from the seed file.
    columns:
      - name: order_id
        description: Unique identifier for each order.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Customer who placed the order.
        tests:
          - not_null

      - name: status
        description: Order status.
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'cancelled', 'processing']

  - name: stg_order_items
    description: Cleaned order item line data from the seed file.
    columns:
      - name: order_item_id
        description: Unique identifier for each order item line.
        tests:
          - not_null
          - unique

      - name: order_id
        description: Related order identifier.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: product_id
        description: Related product identifier.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

  - name: dim_customers
    description: Customer dimension table for analytics.

  - name: dim_products
    description: Product dimension table for analytics.

  - name: fct_order_items
    description: Fact table at the order-item grain.

  - name: fct_orders
    description: Fact table at the order grain.

    - name: daily_sales_summary
    description: Daily revenue and order summary for completed orders.
    columns:
      - name: order_date
        description: Date of completed orders.
        tests:
          - not_null
          - unique

      - name: total_orders
        description: Number of completed orders on that date.
        tests:
          - not_null

      - name: total_quantity_sold
        description: Total quantity sold on that date.
        tests:
          - not_null

      - name: total_revenue
        description: Total completed-order revenue on that date.
        tests:
          - not_null

      - name: average_order_value
        description: Average order value for completed orders on that date.
        tests:
          - not_null

  - name: product_sales_summary
    description: Product-level sales summary for completed orders.
    columns:
      - name: product_id
        description: Unique product identifier.
        tests:
          - not_null
          - unique

      - name: product_name
        description: Product name.
        tests:
          - not_null

      - name: category
        description: Product category.
        tests:
          - not_null

      - name: total_orders
        description: Number of completed orders containing the product.
        tests:
          - not_null

      - name: total_quantity_sold
        description: Total quantity sold for the product.
        tests:
          - not_null

      - name: total_revenue
        description: Total completed-order revenue for the product.
        tests:
          - not_null